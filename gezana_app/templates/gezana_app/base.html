<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Gezana Restaurant{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
  </head>
  <body>
    <header>
      <div class="header-container">
        <img src="{% static 'images/gezana_logo.png' %}" alt="Gezana Logo" class="logo">
        <h1>Gezana Restaurant</h1>
      </div>

      <nav class="navbar">
        <ul>
          <li>
            <a href="{% url 'gezana_app:home' %}"
               class="{% if request.path == '/' %}active{% endif %}">
              Home
            </a>
          </li>
          <li>
            <a href="{% url 'gezana_app:menu_list' %}"
               class="{% if '/menu' in request.path %}active{% endif %}">
              Menu
            </a>
          </li>
          <li>
            <a href="{% url 'gezana_app:make_booking' %}"
               class="{% if '/book' in request.path %}active{% endif %}">
              Book
            </a>
          </li>
          <li>
            <a href="{% url 'gezana_app:about' %}"
               class="{% if '/about' in request.path %}active{% endif %}">
              About
            </a>
          </li>
          <li>
            <a href="{% url 'gezana_app:contact' %}"
               class="{% if '/contact' in request.path %}active{% endif %}">
              Contact
            </a>
          </li>
          <li>
            <a href="/admin/" target="_blank" rel="noopener noreferrer">Admin</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="site-main">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; {% now "Y" %} Gezana Restaurant</p>
    </footer>

    <script>
      function openModal(imgUrl) {
        const modalImage = document.getElementById("modalImage");
        const imageModal = document.getElementById("imageModal");
        if (modalImage && imageModal) {
          modalImage.src = imgUrl;
          imageModal.style.display = "block";
        }
      }

      function closeModal() {
        const imageModal = document.getElementById("imageModal");
        if (imageModal) {
          imageModal.style.display = "none";
        }
      }

      function switchBookingHelpTab(tabName) {
        const manageTab = document.getElementById("manage-booking-tab");
        const cancelTab = document.getElementById("cancel-booking-tab");
        const managePanel = document.getElementById("manage-booking-panel");
        const cancelPanel = document.getElementById("cancel-booking-panel");

        if (!manageTab || !cancelTab || !managePanel || !cancelPanel) {
          return;
        }

        if (tabName === "manage") {
          manageTab.classList.add("active");
          cancelTab.classList.remove("active");
          manageTab.setAttribute("aria-selected", "true");
          cancelTab.setAttribute("aria-selected", "false");
          managePanel.hidden = false;
          cancelPanel.hidden = true;
        } else {
          cancelTab.classList.add("active");
          manageTab.classList.remove("active");
          cancelTab.setAttribute("aria-selected", "true");
          manageTab.setAttribute("aria-selected", "false");
          cancelPanel.hidden = false;
          managePanel.hidden = true;
        }
      }
    </script>
  </body>
</html>
